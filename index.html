<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Synutri</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <script>
        document.write('<script src="version.js?v=' + Date.now() + '"><\/script>');
    </script>
    
    <style>
        :root { --bg: #f8fbff; --prim: #38b2ac; --white: #fff; --text: #2d3748; --shadow: 0 10px 25px rgba(0,0,0,0.05); }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text); overflow-x: hidden; }
        
        /* Sidebar & Overlay */
        #sidebar { position: fixed; top: 0; left: -290px; width: 260px; height: 100%; background: var(--white); z-index: 1002; transition: 0.3s ease; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1001; backdrop-filter: blur(3px); }
        .menu-btn { position: absolute; top: 20px; left: 20px; font-size: 1.8rem; cursor: pointer; color: var(--prim); z-index: 1000; }

        /* Conteneurs */
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        header { padding: 40px 0 10px; font-weight: 800; font-size: 1.6rem; color: #1a202c; }

        /* Carte Dashboard */
        .card-main { background: var(--white); border-radius: 30px; padding: 25px; box-shadow: var(--shadow); text-align: center; margin-bottom: 30px; }
        
        /* --- FORCE BRUTE TAILLE XXL (Sans bloquer la couleur) --- */
        #pantry-chart .apexcharts-datalabel-label {
            font-size: 80px !important;
            font-weight: 900 !important;
            /* On ne met SURTOUT PAS de 'fill' ou 'color' ici */
        }
        #pantry-chart .apexcharts-datalabel-value {
            font-size: 24px !important;
            font-weight: 600 !important;
            fill: #718096 !important;
        }
        /* ---------------------------------- */

        .search-box { background: #edf2f7; border-radius: 18px; padding: 18px; border: none; width: 100%; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn-plus { background: var(--prim); color: white; border: none; width: 42px; height: 42px; border-radius: 14px; font-size: 1.3rem; font-weight: bold; box-shadow: 0 4px 12px rgba(56, 178, 172, 0.3); display: flex; align-items: center; justify-content: center; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--white); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.03); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; color: #a0aec0; text-decoration: none; font-size: 0.75rem; font-weight: 600; flex: 1; border: none; background: none; }
        .nav-item.active { color: var(--prim); }
        .nav-icon { font-size: 1.6rem; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <h2 style="color: var(--prim); margin-top: 40px;">Synutri</h2>
        <p>Version: <span id="app-version" style="font-weight: bold; color: var(--prim);">--</span></p>
        <button onclick="forceUpdate()" style="width:100%; padding:15px; border-radius:15px; border:none; background:#fed7d7; color:#9b2c2c; font-weight:700; cursor:pointer;">🔄 Forcer MAJ</button>
    </div>

    <div id="dash-view" class="container">
        <header>Aujourd'hui</header>
        <div class="card-main">
            <div id="pantry-chart"></div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: -10px; font-size: 0.8rem; font-weight: 600; color: #718096;">
                <span><i style="color:#38b2ac; font-style: normal;">●</i> Prot.</span>
                <span><i style="color:#ed8936; font-style: normal;">●</i> Sel</span>
                <span><i style="color:#4299e1; font-style: normal;">●</i> Sucres</span>
            </div>
        </div>
        <div id="ma-liste"></div>
    </div>

    <div id="search-section" class="container" style="display:none;">
        <header>Ajouter un aliment</header>
        <div style="display:flex; gap:10px;">
            <input type="text" id="search-input" class="search-box" placeholder="Ex: Poulet, Riz...">
            <button onclick="rechercherAliment()" class="btn-plus" style="width:60px; height:56px;">🔍</button>
        </div>
        <div id="search-results"></div>
    </div>

    <nav class="navbar">
        <button onclick="showView('dash')" class="nav-item active" id="nav-dash"><span class="nav-icon">📊</span>Dashboard</button>
        <button class="nav-item"><span class="nav-icon">📅</span>Planning</button>
        <button onclick="showView('search')" class="nav-item" id="nav-search"><span class="nav-icon">📷</span>Scanner</button>
        <button class="nav-item"><span class="nav-icon">🛒</span>Courses</button>
    </nav>

    <script>
        document.write('<script src="app.js?v=' + Date.now() + '"><\/script>');
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const v = (typeof VERSION !== 'undefined') ? VERSION : Date.now();
                navigator.serviceWorker.register('sw.js?v=' + v);
            });
        }
    </script>
</body>
</html>
