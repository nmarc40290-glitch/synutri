<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Synutri</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <script>
        document.write('<script src="version.js?v=' + Date.now() + '"><\/script>');
    </script>
    
    <style>
        :root { --bg: #f7fafc; --prim: #38b2ac; --sec: #ed8936; --acc: #4299e1; --white: #fff; --text: #2d3748; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); overflow-x: hidden; }
        #sidebar { position: fixed; top: 0; left: -290px; width: 260px; height: 100%; background: var(--white); box-shadow: 4px 0 20px rgba(0,0,0,0.1); z-index: 1002; transition: 0.3s ease; padding: 20px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; }
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 1.8rem; cursor: pointer; z-index: 1000; color: var(--prim); }
        .container { width: 90%; max-width: 450px; margin: 80px auto 20px; }
        .card-main { background: var(--white); border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); text-align: center; margin-bottom: 25px; }
        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--white); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.03); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; color: #cbd5e0; text-decoration: none; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--prim); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 4px; }
        #search-section { display: none; padding: 20px; margin-top: 60px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; }
        .search-btn { padding: 15px; border-radius: 12px; background: var(--prim); color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <h2 style="color: var(--prim); margin-top: 40px;">Synutri</h2>
        <p>Version: <span id="app-version" style="color: var(--sec); font-weight: bold;">--</span></p>
        <button style="width:100%; padding:15px; border-radius:12px; border:none; background:#feb2b2; color:#9b2c2c; font-weight:bold;" onclick="forceUpdate()">🔄 Forcer MAJ</button>
    </div>

    <div class="container" id="dash-view">
        <div class="card-main">
            <h3 style="margin-top:0;">Aujourd'hui</h3>
            <div id="pantry-chart"></div>
            <div id="chart-legend" style="display: flex; justify-content: center; gap: 15px; margin-top: -15px; font-size: 0.75rem; color: #718096;">
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 8px; height: 8px; border-radius: 2px; background: #38b2ac;"></span> Prot.</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 8px; height: 8px; border-radius: 2px; background: #ed8936;"></span> Sel</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="width: 8px; height: 8px; border-radius: 2px; background: #4299e1;"></span> Sucres</div>
            </div>
        </div>
        <div id="ma-liste"></div>
    </div>

    <div id="search-section">
        <h2>Ajouter un aliment</h2>
        <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="Ex: Poulet...">
            <button class="search-btn" onclick="rechercherAliment()">🔍</button>
        </div>
        <div id="search-results"></div>
    </div>

    <nav class="navbar">
        <div onclick="showView('dash')" class="nav-item active" id="nav-dash"><div class="nav-icon">📊</div>Dashboard</div>
        <div class="nav-item"><div class="nav-icon">📅</div>Planning</div>
        <div onclick="showView('search')" class="nav-item" id="nav-search"><div class="nav-icon">📷</div>Scanner</div>
        <div class="nav-item"><div class="nav-icon">🛒</div>Courses</div>
    </nav>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=' + (typeof VERSION !== 'undefined' ? VERSION : Date.now()));
        }
    </script>
</body>
</html>
